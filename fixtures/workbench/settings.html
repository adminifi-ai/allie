<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Settings</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 2rem; line-height: 1.5; }
      label { display: block; margin-top: 1rem; }
    </style>
  </head>
  <body>
    <header>
      <h1>Settings</h1>
      <nav aria-label="Primary">
        <a href="/">Home</a>
        <a href="/help.html">Help</a>
      </nav>
    </header>
    <main>
      <form>
        <label for="email">Email</label>
        <input id="email" name="email" autocomplete="email" required>
        <p id="email-preview" aria-live="polite"></p>
        <button type="submit">Save settings</button>
      </form>
    </main>
    <script>
      const email = document.querySelector('#email');
      const preview = document.querySelector('#email-preview');
      email.addEventListener('input', () => {
        preview.textContent = email.value;
        preview.toggleAttribute('data-ready', email.value.includes('.typed'));
      });
    </script>
  </body>
</html>
