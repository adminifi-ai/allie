<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Allie Fixture Login</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #101418;
      --muted: #47515f;
      --line: #d5dbe3;
      --surface: #ffffff;
      --page: #f4f7fa;
      --accent: #185bff;
      --accent-ink: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--page);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
      display: grid;
      place-items: center;
      padding: 32px;
    }

    main {
      width: min(100%, 440px);
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 28px;
    }

    h1,
    p {
      margin: 0;
    }

    h1 {
      font-size: 32px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    p {
      margin-top: 10px;
      color: var(--muted);
    }

    form {
      margin-top: 24px;
      display: grid;
      gap: 16px;
    }

    label {
      display: grid;
      gap: 6px;
      font-weight: 700;
    }

    input {
      min-height: 44px;
      border: 1px solid #98a4b3;
      border-radius: 4px;
      padding: 8px 10px;
      font: inherit;
    }

    input:focus {
      outline: 3px solid #9bb8ff;
      outline-offset: 2px;
    }

    button {
      min-height: 44px;
      border: 0;
      border-radius: 4px;
      color: var(--accent-ink);
      background: var(--accent);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:focus {
      outline: 3px solid #0b225c;
      outline-offset: 2px;
    }

    .help {
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Sign in to Allie</h1>
    <p>Use the local fixture credentials supplied by the test environment.</p>
    <form action="/dashboard" method="post">
      <label for="email">
        Email address
        <input id="email" name="email" type="email" autocomplete="email" value="qa@example.test" required>
      </label>
      <label for="password">
        Password
        <input id="password" name="password" type="password" autocomplete="current-password" value="correct horse battery staple" required>
      </label>
      <button type="submit">Sign in</button>
      <p class="help" id="fixture-help">This fixture is static; Allie V0 inspects the route state without submitting credentials.</p>
    </form>
  </main>
</body>
</html>
