name: Allie release bundle

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  build-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run verify

      - run: scripts/package-release.sh dist
      - name: Verify archive on Debian 12
        run: |
          set -euo pipefail
          smoke_root="$RUNNER_TEMP/allie-release-runtime-smoke"
          rm -rf "$smoke_root"
          mkdir -p "$smoke_root/work"
          tar -xzf dist/allie-linux-x64.tar.gz -C "$smoke_root"
          docker run --rm \
            -v "$smoke_root/allie:/opt/allie:ro" \
            -v "$smoke_root/work:/work" \
            -w /work \
            debian:bookworm-slim \
            /opt/allie/bin/allie init --manifest .allie/manifest.yml --app-name "Release Runtime Smoke"
          test -s "$smoke_root/work/.allie/manifest.yml"


      - name: Generate release checksums
        run: scripts/release-checksums.sh dist

      - name: Stage unsigned release inputs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: unsigned-release-bundle
          path: |
            dist/allie-linux-x64.tar.gz
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 1

  sign-and-publish:
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Download unsigned release inputs
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: unsigned-release-bundle
          path: dist

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign release bundle with GitHub OIDC
        run: >-
          cosign sign-blob --yes
          --bundle dist/allie-linux-x64.tar.gz.sigstore.json
          dist/allie-linux-x64.tar.gz

      - name: Publish only after exact asset readback
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          [[ "$tag" =~ ^v0\.[0-9]+\.[0-9]+$ ]] || {
            echo "Release tag must match v0.x.y, got $tag" >&2
            exit 1
          }
          release_id=
          created=false

          cleanup() {
            status=$?
            if [ "$status" -ne 0 ] && [ "$created" = true ] && [ -n "$release_id" ]; then
              set +e
              gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/$release_id"
              set -e
            fi
            exit "$status"
          }
          trap cleanup EXIT

          tag_commit=$(gh api "repos/$GITHUB_REPOSITORY/commits/$tag" --jq .sha)
          if [ "$tag_commit" != "$GITHUB_SHA" ]; then
            echo "Release tag $tag resolves to $tag_commit, expected $GITHUB_SHA" >&2
            exit 1
          fi

          release_id=$(gh api --method POST "repos/$GITHUB_REPOSITORY/releases" \
            -f tag_name="$tag" \
            -f name="$tag" \
            -F draft=true \
            -F generate_release_notes=true \
            --jq .id)
          created=true
          test -n "$release_id"

          gh release upload "$tag" --repo "$GITHUB_REPOSITORY" \
            dist/allie-linux-x64.tar.gz \
            dist/SHA256SUMS \
            dist/allie-linux-x64.tar.gz.sigstore.json

          actual_assets=$(gh api "repos/$GITHUB_REPOSITORY/releases/$release_id" --jq '.assets[].name' | LC_ALL=C sort)
          expected_assets=$(printf '%s\n' \
            SHA256SUMS \
            allie-linux-x64.tar.gz \
            allie-linux-x64.tar.gz.sigstore.json | LC_ALL=C sort)
          if [ "$actual_assets" != "$expected_assets" ]; then
            printf 'release asset mismatch\nexpected:\n%s\nactual:\n%s\n' "$expected_assets" "$actual_assets" >&2
            exit 1
          fi

          gh api --method PATCH "repos/$GITHUB_REPOSITORY/releases/$release_id" -F draft=false >/dev/null
          created=false
