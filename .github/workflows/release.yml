name: Allie release bundle

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run verify

      - run: scripts/package-release.sh dist

      - name: Upload release bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --verify-tag --title "$GITHUB_REF_NAME" --notes "Allie $GITHUB_REF_NAME"
          gh release upload "$GITHUB_REF_NAME" dist/allie-linux-x64.tar.gz --clobber
