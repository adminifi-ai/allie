trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - main
      - master

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self

  - script: |
      mkdir -p .allie/tooling
      curl --fail --location --silent --show-error \
        https://github.com/adminifi-ai/allie/releases/latest/download/allie-linux-x64.tar.gz \
        | tar -xz -C .allie/tooling
      echo "##vso[task.prependpath]$(pwd)/.allie/tooling/allie/bin"
    displayName: Install Allie

  - script: allie doctor --manifest .allie/manifest.yml --out .allie/doctor
    displayName: Check Allie setup

  - script: allie verify --manifest .allie/manifest.yml --out .allie/verify/latest
    displayName: Run Allie

  - script: |
      set -eu
      echo "##vso[task.setvariable variable=ALLIE_PUBLICATION_READY]false"
      allie publication --verify-root .allie/verify/latest --out .allie/public/latest
      echo "##vso[task.setvariable variable=ALLIE_PUBLICATION_READY]true"
    displayName: Prepare policy-approved public summary
    condition: always()

  - task: CopyFiles@2
    displayName: Stage policy-approved public files
    condition: and(always(), eq(variables['ALLIE_PUBLICATION_READY'], 'true'))
    inputs:
      SourceFolder: .allie/public/latest
      Contents: |
        allie-public-summary.json
        allie-public-summary.md
        publication-receipt.json
        allie-run-manifest.json
      TargetFolder: $(Build.ArtifactStagingDirectory)/allie-public
      CleanTargetFolder: true

  - publish: $(Build.ArtifactStagingDirectory)/allie-public
    artifact: allie-verify
    displayName: Publish Allie public summary
    condition: and(always(), eq(variables['ALLIE_PUBLICATION_READY'], 'true'))
