name: Allie accessibility evidence

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  allie:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Allie
        run: |
          mkdir -p .allie/tooling
          curl --fail --location --silent --show-error \
            https://github.com/adminifi-ai/allie/releases/latest/download/allie-linux-x64.tar.gz \
            | tar -xz -C .allie/tooling
          echo "$PWD/.allie/tooling/allie/bin" >> "$GITHUB_PATH"

      - name: Check Allie setup
        run: allie doctor --manifest .allie/manifest.yml --out .allie/doctor

      - name: Run Allie
        run: allie verify --manifest .allie/manifest.yml --out .allie/verify/latest

      - name: Prepare policy-approved public summary
        id: publication
        if: always()
        run: allie publication --verify-root .allie/verify/latest --out .allie/public/latest

      - name: Upload Allie public summary
        if: always() && steps.publication.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: allie-verify
          path: |
            .allie/public/latest/allie-public-summary.json
            .allie/public/latest/allie-public-summary.md
            .allie/public/latest/publication-receipt.json
            .allie/public/latest/allie-run-manifest.json
