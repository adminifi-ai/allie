id: trust-missing-credential
name: Missing credential trust-boundary fixture
app_name: Allie fixture app
environment: local-fixture
auth_profile: staging-secret-profile
credentials:
  profile: staging-secret-profile
  provider: env
  env: ALLIE_TEST_DO_NOT_SET_SECRET
  required: true
target:
  kind: local_fixture
  fixture_dir: ../fixtures/login
policy:
  profile: wcag22-aa
  blocking_classes:
    - deterministic
    - scripted_required
  worker_timeout_ms: 30000
artifacts:
  redaction_status: not_redacted_local_fixture
  retention_class: local_ephemeral
model:
  enabled: false
  provider_allowlist: []
  zdr_required: true
known_nondeterminism: []
browser:
  viewport:
    width: 1280
    height: 900
  color_scheme: light
  reduced_motion: reduce
  locale: en-US
  zoom: 1.0
flow:
  id: login-critical-path
  description: Exercise missing credential preflight without storing secret values.
  states:
    - id: login-form
      path: /
      description: Initial login form route state.
      required: true
      axe: true
      screenshot: true
