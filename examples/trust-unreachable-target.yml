id: trust-unreachable-target
name: Unreachable target trust-boundary fixture
app_name: Unreachable fixture app
environment: local-unreachable
auth_profile: local-fixture-no-auth
credentials:
  profile: local-fixture-no-auth
  provider: none
  required: false
target:
  kind: url
  base_url: http://127.0.0.1:65530/
policy:
  profile: wcag22-aa
  blocking_classes:
    - deterministic
    - scripted_required
  worker_timeout_ms: 30000
artifacts:
  redaction_status: not_redacted_local_fixture
  retention_class: local_ephemeral
model:
  enabled: false
  provider_allowlist: []
  zdr_required: true
known_nondeterminism: []
browser:
  viewport:
    width: 1280
    height: 900
  color_scheme: light
  reduced_motion: reduce
  locale: en-US
  zoom: 1.0
flow:
  id: unreachable-critical-path
  description: Exercise unreachable target worker error mapping.
  states:
    - id: unreachable-home
      path: /
      description: Route state that should be unreachable.
      required: true
      axe: true
      screenshot: true
