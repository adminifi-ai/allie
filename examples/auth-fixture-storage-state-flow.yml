id: auth-fixture-storage-state-flow
name: Local authenticated fixture flow (storageState)
app_name: Allie auth fixture app
environment: local-fixture
auth_profile: local-fixture-storage-state
credentials:
  profile: local-fixture-storage-state
  provider: none
  required: false
target:
  kind: local_fixture
  fixture_dir: ../fixtures/auth
# StorageState hatch proof: discovery treats start_path as auth bootstrap chrome,
# then the worker loads a captured Playwright session from the env-named path and
# audits the gated dashboard without executing login steps. The session file is
# generated by scripts/auth-smoke.sh and removed after the smoke; the worker
# request carries only the env var name.
auth:
  start_path: /login.html
  storage_state_env: ALLIE_AUTH_FIXTURE_STORAGE_STATE
  authenticated_marker: { selector: "#dashboard" }
policy:
  profile: wcag22-aa
  blocking_classes:
    - deterministic
    - scripted_required
  worker_timeout_ms: 90000
artifacts:
  redaction_status: not_redacted_local_fixture
  retention_class: local_ephemeral
model:
  enabled: false
  provider_allowlist: []
  zdr_required: true
known_nondeterminism: []
browser:
  viewport:
    width: 1280
    height: 900
  color_scheme: light
  reduced_motion: reduce
  locale: en-US
  zoom: 1.0
flow:
  id: auth-critical-path-storage-state
  description: Audit the gated dashboard route using a captured browser session.
  states:
    - id: dashboard
      path: /dashboard.html
      description: Authenticated dashboard route behind the login gate.
      required: true
      axe: true
      screenshot: true
      dom_snapshot: true
      trace: true
