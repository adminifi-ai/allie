id: action-steps-negative-flow
name: Local action-steps fixture flow negative control
app_name: Allie action steps fixture app
environment: local-fixture
auth_profile: local-fixture-no-auth
credentials:
  profile: local-fixture-no-auth
  provider: none
  required: false
target:
  kind: local_fixture
  fixture_dir: ../fixtures/workbench
policy:
  profile: wcag22-aa
  blocking_classes:
    - deterministic
    - scripted_required
  worker_timeout_ms: 30000
artifacts:
  redaction_status: not_redacted_local_fixture
  retention_class: local_ephemeral
model:
  enabled: false
  provider_allowlist: []
  zdr_required: true
known_nondeterminism: []
browser:
  viewport:
    width: 1280
    height: 900
  color_scheme: light
  reduced_motion: reduce
  locale: en-US
  zoom: 1.0
flow:
  id: action-steps-negative-control
  description: Prove missing state actions block instead of passing silently.
  states:
    - id: missing-action-target
      path: /
      description: Workbench home with a deliberately missing action selector.
      required: true
      steps:
        - click: { selector: "#does-not-exist" }
        - wait_for: { selector: "#menu:not([hidden])" }
      axe: false
      screenshot: true
      dom_snapshot: true
      trace: true
