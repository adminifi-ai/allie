id: autonomous-workbench
name: Local autonomous workbench fixture
app_name: Allie autonomous fixture app
environment: local-fixture
auth_profile: local-fixture-no-auth
credentials:
  profile: local-fixture-no-auth
  provider: none
  required: false
target:
  kind: local_fixture
  fixture_dir: ../fixtures/workbench
policy:
  profile: wcag22-aa
  blocking_classes:
    - deterministic
    - scripted_required
  worker_timeout_ms: 30000
artifacts:
  redaction_status: not_redacted_local_fixture
  retention_class: local_ephemeral
model:
  enabled: false
  provider_allowlist: []
  zdr_required: true
known_nondeterminism: []
browser:
  viewport:
    width: 1280
    height: 900
  color_scheme: light
  reduced_motion: reduce
  locale: en-US
  zoom: 1.0
flow:
  id: autonomous-seed-flow
  description: Seed route for autonomous discovery.
  states:
    - id: home
      path: /
      description: Discoverable home surface.
      required: true
      axe: true
      screenshot: true
      dom_snapshot: true
      accessibility_tree: true
      keyboard: true
      video: true
      trace: true
