id: axe-target-size-desktop-only-flow
name: Target-size desktop-only fixture flow
app_name: Allie fixture app
environment: local-fixture
auth_profile: local-fixture-no-auth
credentials:
  profile: local-fixture-no-auth
  provider: none
  required: false
target:
  kind: local_fixture
  fixture_dir: ../fixtures/axe-target-size-desktop-only
policy:
  profile: wcag22-aa
  blocking_classes:
    - deterministic
    - scripted_required
  worker_timeout_ms: 30000
artifacts:
  redaction_status: not_redacted_local_fixture
  retention_class: local_ephemeral
model:
  enabled: false
  provider_allowlist: []
  zdr_required: true
known_nondeterminism: []
browser:
  viewport:
    width: 1280
    height: 900
  color_scheme: light
  reduced_motion: reduce
  locale: en-US
  zoom: 1.0
flow:
  id: axe-target-size-desktop-only-critical-path
  description: >-
    Inspect a fixture where axe-core target-size evaluates a desktop-only
    control, but the control is hidden in the mobile viewport.
  states:
    - id: target-size-desktop-only
      path: /
      description: Desktop target-size pass evidence without mobile candidates.
      required: true
      axe: true
      screenshot: true
