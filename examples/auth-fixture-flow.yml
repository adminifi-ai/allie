id: auth-fixture-flow
name: Local authenticated fixture flow
app_name: Allie auth fixture app
environment: local-fixture
auth_profile: local-fixture-auth
credentials:
  profile: local-fixture-auth
  provider: env
  env: ALLIE_AUTH_FIXTURE_PASSWORD
  required: true
target:
  kind: local_fixture
  fixture_dir: ../fixtures/auth
# Authenticated-audit recipe. Selectors, paths, and env-var NAMES ride in the
# request; the worker reads the secret VALUES from its inherited environment, so
# no credential value is ever written to disk or any artifact.
auth:
  start_path: /login.html
  steps:
    - fill: { selector: "#email", value_env: ALLIE_AUTH_FIXTURE_USER }
    - fill: { selector: "#password", value_env: ALLIE_AUTH_FIXTURE_PASSWORD }
    - click: { selector: "button[type=submit]" }
    - wait_for: { selector: "#dashboard" }
  authenticated_marker: { selector: "#dashboard" }
  # storage_state_env: ALLIE_AUTH_FIXTURE_STORAGE_STATE   # optional SSO hatch: env names a storageState path
policy:
  profile: wcag22-aa
  blocking_classes:
    - deterministic
    - scripted_required
  worker_timeout_ms: 30000
artifacts:
  redaction_status: not_redacted_local_fixture
  retention_class: local_ephemeral
model:
  enabled: false
  provider_allowlist: []
  zdr_required: true
known_nondeterminism: []
browser:
  viewport:
    width: 1280
    height: 900
  color_scheme: light
  reduced_motion: reduce
  locale: en-US
  zoom: 1.0
flow:
  id: auth-critical-path
  description: Log into the fixture and audit the gated dashboard route.
  states:
    - id: dashboard
      path: /dashboard.html
      description: Authenticated dashboard route behind the login gate.
      required: true
      axe: true
      screenshot: true
      dom_snapshot: true
      trace: true
