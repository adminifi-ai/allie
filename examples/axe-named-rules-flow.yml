id: axe-named-rules-flow
name: Named axe rule fixture flow
app_name: Allie fixture app
environment: local-fixture
auth_profile: local-fixture-no-auth
credentials:
  profile: local-fixture-no-auth
  provider: none
  required: false
target:
  kind: local_fixture
  fixture_dir: ../fixtures/axe-named-rules
policy:
  profile: wcag22-aa
  blocking_classes:
    - deterministic
    - scripted_required
  worker_timeout_ms: 30000
artifacts:
  redaction_status: not_redacted_local_fixture
  retention_class: local_ephemeral
model:
  enabled: false
  provider_allowlist: []
  zdr_required: true
known_nondeterminism: []
browser:
  viewport:
    width: 1280
    height: 900
  color_scheme: light
  reduced_motion: reduce
  locale: en-US
  zoom: 1.0
flow:
  id: axe-named-rules-critical-path
  description: >-
    Inspect a fixture page that deliberately violates the five named axe-core
    rules enabled for AL-085 (target-size, label-content-name-mismatch,
    autocomplete-valid, css-orientation-lock, meta-viewport), proving each is
    caught deterministically with the model disabled.
  states:
    - id: named-rules-form
      path: /
      description: Fixture route carrying all five deliberate rule violations.
      required: true
      axe: true
      screenshot: true
