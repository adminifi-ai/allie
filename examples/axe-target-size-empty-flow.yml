id: axe-target-size-empty-flow
name: Target-size empty fixture flow
app_name: Allie fixture app
environment: local-fixture
auth_profile: local-fixture-no-auth
credentials:
  profile: local-fixture-no-auth
  provider: none
  required: false
target:
  kind: local_fixture
  fixture_dir: ../fixtures/axe-target-size-empty
policy:
  profile: wcag22-aa
  blocking_classes:
    - deterministic
    - scripted_required
  worker_timeout_ms: 30000
artifacts:
  redaction_status: not_redacted_local_fixture
  retention_class: local_ephemeral
model:
  enabled: false
  provider_allowlist: []
  zdr_required: true
known_nondeterminism: []
browser:
  viewport:
    width: 1280
    height: 900
  color_scheme: light
  reduced_motion: reduce
  locale: en-US
  zoom: 1.0
flow:
  id: axe-target-size-empty-critical-path
  description: >-
    Inspect a fixture with no interactive target so axe-core target-size has no
    matching element to evaluate and must not fabricate a pass.
  states:
    - id: target-size-empty
      path: /
      description: Fixture route with no target-size candidates.
      required: true
      axe: true
      screenshot: true
