id: action-steps-flow
name: Local action-steps fixture flow
app_name: Allie action steps fixture app
environment: local-fixture
auth_profile: local-fixture-no-auth
credentials:
  profile: local-fixture-no-auth
  provider: none
  required: false
target:
  kind: local_fixture
  fixture_dir: ../fixtures/workbench
policy:
  profile: wcag22-aa
  blocking_classes:
    - deterministic
    - scripted_required
  worker_timeout_ms: 30000
artifacts:
  redaction_status: not_redacted_local_fixture
  retention_class: local_ephemeral
model:
  enabled: false
  provider_allowlist: []
  zdr_required: true
known_nondeterminism: []
browser:
  viewport:
    width: 1280
    height: 900
  color_scheme: light
  reduced_motion: reduce
  locale: en-US
  zoom: 1.0
flow:
  id: action-steps-critical-path
  description: Open the workbench action menu before capturing evidence.
  states:
    - id: open-menu
      path: /
      description: Workbench home after opening the actions menu.
      required: true
      steps:
        - click: { selector: "#open-menu" }
        - wait_for: { selector: "#menu:not([hidden])" }
      axe: false
      screenshot: true
      dom_snapshot: true
      accessibility_tree: true
      keyboard: true
      trace: true
    - id: typed-email
      path: /settings.html
      description: Settings form after filling and typing into the email field.
      required: true
      steps:
        - fill: { selector: "#email", value: "qa@example.test" }
        - type: { selector: "#email", text: ".typed" }
        - wait_for: { selector: "#email-preview[data-ready]" }
      axe: false
      screenshot: true
      dom_snapshot: true
      trace: true
